<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Static Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            color: #333;
        }
        .highlight {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Hello, GitHub Pages!</h1>
    <p>Welcome to this simple static page.</p>
    <div class="highlight">
        <p>This page is served by GitHub Pages.</p>
    </div>
    <p>Happy coding! 🎉</p>
</body>
</html>
